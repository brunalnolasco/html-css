<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{ /* box level*/
           
        
            background-color: aliceblue;
            height: 300px;
            width: 300px;
            
           /* border-width: 10px;
            border-style: solid;
            border-color: aqua;*/
            
            border: 10px solid aqua;


            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/


            padding: 10px 10px 10px 10px; /* short hand se todas as medidas forem iguais coloca so 1x o valor padding: 10px; se for padding 10px 20px; 10 é o de top e bottom e 20 é rigth e left*/

            /*margin: auto;
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;*/

            margin: 20px 20px 40px 20px; /* se quiser centralizar a da direita e esquerda 20 auto 20 auto*/

            /*outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;*/ 

            outline: 5px dashed salmon;
        }
        a{ /* inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: pink;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos tambem sao exemplo de box-level, mas os <a href="#"> links sao exemplos de caixa inline-level</a> Vamos ver como tudo isso funciona</p>
</body>
</html>
