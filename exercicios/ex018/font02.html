<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: Cherish ;
            src: url('fontes/Cherish.otf') format('opentype'),url(fontes/Cherish.ttf) format('truetype'); 
            font-weight: normal;
            font-style: normal;

            /*Tipos de format
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (apple advanced typography)
            - svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'Cherish', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatum deleniti ad illo aut aliquid nihil esse repellendus, nulla similique saepe soluta itaque at omnis minima eum eos possimus? Tempore, consequuntur.</p>
    
</body>
</html>
